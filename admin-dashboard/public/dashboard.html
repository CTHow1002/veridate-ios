<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VeriDate Admin Dashboard</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">VeriDate Admin</p>
        <h1>Verification Review</h1>
      </div>
      <button id="logoutButton" class="secondary-button">Sign Out</button>
    </header>

    <main class="dashboard">
      <section class="toolbar">
        <div>
          <h2>Pending Submissions</h2>
          <p id="summaryText">Loading pending reviews...</p>
        </div>
        <button id="refreshButton" class="secondary-button">Refresh</button>
      </section>

      <section id="errorBanner" class="error-banner" hidden></section>
      <section id="submissionsList" class="submissions-list"></section>
    </main>

    <template id="submissionTemplate">
      <article class="submission-card">
        <div class="submission-main">
          <div class="identity-block">
            <span class="status-dot"></span>
            <div>
              <h3 data-field="fullName"></h3>
              <p data-field="submittedAt"></p>
            </div>
          </div>

          <dl class="profile-grid">
            <div>
              <dt>Date of Birth</dt>
              <dd data-field="dateOfBirth"></dd>
            </div>
            <div>
              <dt>Work</dt>
              <dd data-field="work"></dd>
            </div>
            <div>
              <dt>Education</dt>
              <dd data-field="education"></dd>
            </div>
          </dl>

          <div class="file-grid">
            <a data-file="selfie" target="_blank" rel="noreferrer">Selfie</a>
            <a data-file="idDocument" target="_blank" rel="noreferrer">ID Document</a>
            <a data-file="jobProof" target="_blank" rel="noreferrer">Job Proof</a>
            <a data-file="educationProof" target="_blank" rel="noreferrer">Education Proof</a>
          </div>
        </div>

        <div class="review-panel">
          <textarea data-field="reason" placeholder="Rejection reason"></textarea>
          <div class="action-row">
            <button data-action="reject" class="danger-button">Reject</button>
            <button data-action="approve">Approve</button>
          </div>
          <p data-field="rowError" class="form-error"></p>
        </div>
      </article>
    </template>

    <script src="/assets/dashboard.js"></script>
  </body>
</html>
